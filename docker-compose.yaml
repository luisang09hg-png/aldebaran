version: '3.8'
services:
  api:
    build: ./apps/api
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis
    env_file: .env

  web:
    build: ./apps/web
    ports:
      - "5173:5173"

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: jobsearch
      POSTGRES_PASSWORD: secret
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  db_data:
